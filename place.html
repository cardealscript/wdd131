<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moçambique</title>
  <link rel="stylesheet" href="styles/place.css">
  <script src="scripts/place.js" defer></script>
</head>
<body>

  <header>
    <h1>Mozambique</h1>
  </header>

  <main>
    <!-- Hero Image -->
    <div class="hero">
      <picture>
        <source srcset="images/hero-large.webp" media="(min-width: 1000px)">
        <source srcset="images/hero-medium.webp" media="(min-width: 550px)">
        <img src="images/hero-small.webp" alt="Moçambique" width="1500" height="900">
      </picture>
    </div>

    <!-- Data Section -->
    <section class="data">
      <h2>Data</h2>
      <table>
        <tr><th>Area</th><td>801,590 sq km</td></tr>
        <tr><th>Population</th><td>32,790,338</td></tr>
        <tr><th>Capital</th><td>Maputo</td></tr>
        <tr><th>Languages</th><td>Portuguese</td></tr>
        <tr><th>Currency</th><td>Metical (MZN)</td></tr>
        <tr><th>Time Zone</th><td>UTC+2</td></tr>
        <tr><th>Calling Code</th><td>+258</td></tr>
        <tr><th>Internet TLD</th><td>.mz</td></tr>
      </table>
    </section>

    <!-- Weather Section -->
    <section class="weather">
      <h2>Weather</h2>
      <img src="images/weather.svg" alt="Weather Icon" class="weather-icon-mobile">
      <table>
        <tr><th>Temperature</th><td>28 °C</td></tr>
        <tr><th>Conditions</th><td>Partly Cloudy</td></tr>
        <tr><th>Wind</th><td>15 km/h</td></tr>
        <tr><th>Wind Chill</th><td id="windchill"></td></tr>
      </table>
    </section>
  </main>

  <footer>
    <p>&#169;<span id="currentYear"></span> 🌍 Moçambique</p>
    <p>Last Modified: <span id="lastModified"></span></p>
  </footer>

</body>
</html>
